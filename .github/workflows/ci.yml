name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      AUTOMATION_KIT_PATTERNS: ${{ github.workspace }}/automation-kit/patterns
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Check out Automation Kit backbone
        uses: actions/checkout@v6
        with:
          repository: stefan-mcf/automation-kit
          path: automation-kit
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install Automation Kit backbone
        run: python -m pip install ./automation-kit
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Run tests
        run: python -m pytest tests -q
      - name: Run lint
        run: python -m ruff check src tests scripts
      - name: Run mypy
        run: python -m mypy src
      - name: Run sandbox walkthrough
        run: examples/run-sandbox-walkthrough.sh
